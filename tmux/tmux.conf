# Common Options
set -g allow-rename off
set -g alternate-screen on
set -g base-index 1
set -g default-terminal "screen-256color"
set -g escape-time 0
set -g focus-events on
set -g mouse on
set -g pane-base-index 1
set -g renumber-windows on
set -g repeat-time 0
setw -g aggressive-resize on
setw -g mode-keys vi

# Configuration Reload
bind r \
	source-file ~/.tmux.conf \; \
	display-message "~/.tmux.conf reloaded"

# Pane Movement
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Pane Splitting
unbind '"'
unbind '%'
bind | split-window -h
bind - split-window -v

# Bell and Activities
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g bell-action none
setw -g monitor-activity off

# Panes
set -g pane-border-bg colour235
set -g pane-border-fg colour238
set -g pane-active-border-bg colour236
set -g pane-active-border-fg colour51

# Status Bar
set -g status-bg colour234
set -g status-fg colour137
set -g status-position bottom
set -g status-justify left
set -g status-interval 2
set -g status-left ''
set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20

# Window Status
setw -g window-status-bg colour235
setw -g window-status-fg colour138
setw -g window-status-attr none
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

setw -g window-status-current-bg colour238
setw -g window-status-current-fg colour81
setw -g window-status-current-attr bold
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '

setw -g window-status-bell-attr bold
setw -g window-status-bell-fg colour255
setw -g window-status-bell-bg colour1

# Messaging
set -g message-bg colour166
set -g message-fg colour232
set -g message-command-fg blue
set -g message-command-bg black

# Window Mode
setw -g mode-bg colour6
setw -g mode-fg colour0

# Terminal Title
set -g set-titles on
set -g set-titles-string "#W | tmux:#S"

# Modes
setw -g clock-mode-colour colour135
setw -g mode-attr bold
setw -g mode-bg colour238
setw -g mode-fg colour196

# Mouse Features
bind -n MouseUp2Status kill-window -t =
bind -n MouseDrag1Status swap-window -t =
bind -n DoubleClick1Status new-window

# System Clipboard
bind -n MouseDown3Pane run-shell 'tmux set-buffer "$(${TMUX_CLIPBOARD_GET})"; tmux paste-buffer -d'
bind -n DoubleClick1Pane copy-mode -M \; send-keys -X select-word
bind -n TripleClick1Pane copy-mode -M \; send-keys -X select-line

bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel '${TMUX_CLIPBOARD_SET}'
bind -T copy-mode-vi C-w send-keys Enter
bind -T copy-mode-vi M-w send-keys Enter
bind -T copy-mode-vi MouseDragEnd1Pane send-keys Enter
